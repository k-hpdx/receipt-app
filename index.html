<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>領収書発行アプリ</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>領収書発行</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="receipt">領収書作成</button>
        <button class="tab" data-tab="settings">設定</button>
      </nav>
    </header>

    <!-- 領収書作成タブ -->
    <main id="tab-receipt" class="tab-content active">
      <div class="layout">
        <section class="form-section">
          <h2>入力</h2>
          <div class="form-group">
            <label for="recipientName">宛名</label>
            <div class="input-with-suffix">
              <input type="text" id="recipientName" placeholder="例：株式会社サンプル">
              <span class="suffix">様</span>
            </div>
          </div>

          <div class="form-group">
            <label for="issueDate">発行日</label>
            <input type="date" id="issueDate">
          </div>

          <div class="form-group">
            <label for="description">但し書き</label>
            <input type="text" id="description" placeholder="例：商品代として">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="taxType">入力方式</label>
              <select id="taxType">
                <option value="inclusive">税込</option>
                <option value="exclusive">税抜</option>
              </select>
            </div>
            <div class="form-group">
              <label for="taxRate">税率</label>
              <select id="taxRate">
                <option value="0.10">10%</option>
                <option value="0.08">8%（軽減税率）</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label for="amount">金額</label>
            <div class="input-with-suffix">
              <input type="number" id="amount" placeholder="0" min="0">
              <span class="suffix">円</span>
            </div>
          </div>

          <div class="calc-result">
            <div class="calc-row">
              <span>税抜金額</span>
              <span id="calcExclusive">0 円</span>
            </div>
            <div class="calc-row">
              <span>消費税額（<span id="calcTaxRateLabel">10%</span>）</span>
              <span id="calcTax">0 円</span>
            </div>
            <div class="calc-row total">
              <span>税込合計</span>
              <span id="calcInclusive">0 円</span>
            </div>
          </div>

          <div class="form-actions">
            <button id="btnGenerate" class="btn-primary">PDF発行</button>
          </div>
        </section>

        <section class="preview-section">
          <h2>プレビュー</h2>
          <div id="receiptPreview" class="receipt-preview">
            <div class="receipt">
              <h3 class="receipt-title">領 収 書</h3>

              <div class="receipt-header">
                <div class="receipt-recipient">
                  <span id="prevRecipient" class="recipient-name">（宛名未入力）</span>
                  <span class="recipient-suffix">様</span>
                </div>
                <div class="receipt-date">
                  <span id="prevDate">年　月　日</span>
                </div>
              </div>

              <div class="receipt-amount-box">
                <span class="receipt-amount-label">金額</span>
                <span id="prevAmount" class="receipt-amount-value">￥ 0 -</span>
              </div>

              <div class="receipt-description">
                但　<span id="prevDescription">（但し書き未入力）</span>
              </div>

              <div class="receipt-tax-detail">
                <table>
                  <tr>
                    <th>税率</th>
                    <th>税抜金額</th>
                    <th>消費税額</th>
                  </tr>
                  <tr>
                    <td id="prevTaxRate">10%</td>
                    <td id="prevExclusive">0 円</td>
                    <td id="prevTax">0 円</td>
                  </tr>
                </table>
              </div>

              <div class="receipt-issuer">
                <p id="prevCompanyName" class="issuer-name">（会社名未設定）</p>
                <p id="prevCompanyAddress" class="issuer-address"></p>
                <p id="prevCompanyPhone" class="issuer-phone"></p>
                <p id="prevRegistrationNumber" class="issuer-registration">登録番号：未設定</p>
              </div>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- 設定タブ -->
    <main id="tab-settings" class="tab-content">
      <section class="form-section settings-section">
        <h2>発行者情報（自社）</h2>
        <p class="settings-note">この情報はブラウザに保存され、領収書に表示されます。</p>

        <div class="form-group">
          <label for="companyName">会社名 / 屋号</label>
          <input type="text" id="companyName" placeholder="例：株式会社サンプル">
        </div>

        <div class="form-group">
          <label for="companyAddress">住所</label>
          <input type="text" id="companyAddress" placeholder="例：東京都千代田区...">
        </div>

        <div class="form-group">
          <label for="companyPhone">電話番号</label>
          <input type="text" id="companyPhone" placeholder="例：03-1234-5678">
        </div>

        <div class="form-group">
          <label for="registrationNumber">登録番号</label>
          <div class="input-with-prefix">
            <span class="prefix">T</span>
            <input type="text" id="registrationNumber" placeholder="1234567890123" maxlength="13" pattern="[0-9]{13}">
          </div>
          <small class="hint">適格請求書発行事業者の13桁の番号</small>
        </div>

        <div class="form-actions">
          <button id="btnSaveSettings" class="btn-primary">保存</button>
          <span id="saveStatus" class="save-status"></span>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
